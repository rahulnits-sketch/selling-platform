services:
  - type: web
    name: car-dealer-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: car-dealer-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_ORIGIN
        sync: false
      - key: ADMIN_USERNAME
        value: rahul#123
      - key: ADMIN_PASSWORD
        sync: false

databases:
  - name: car-dealer-db
    plan: free
